# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required env vars (set in .env or your secrets manager):
#   SECRET_KEY          — random string, min 32 chars
#   ENCRYPTION_KEY      — Fernet key (generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   SMTP_HOST / SMTP_USER / SMTP_PASSWORD / SMTP_FROM
#
# Postgres credentials should be rotated from the defaults below.

services:
  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports: []  # do not expose DB port in production

  api:
    environment:
      APP_ENV: production
      LOG_LEVEL: warning
      DATABASE_URL: postgresql+asyncpg://nordiq:${POSTGRES_PASSWORD:?}@db:5432/nordiq
      SYNC_DATABASE_URL: postgresql://nordiq:${POSTGRES_PASSWORD:?}@db:5432/nordiq
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL must be set}
      SMTP_TLS: "true"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    environment:
      API_URL: ${API_URL:-http://api:8000}
    deploy:
      resources:
        limits:
          memory: 256M
