services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nordiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nordiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nordiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://nordiq:password@db:5432/nordiq
      SYNC_DATABASE_URL: postgresql://nordiq:password@db:5432/nordiq
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-min-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8501}
      REPORT_OUTPUT_DIR: /app/reports
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-notifications@nordiq.example.com}
      SMTP_TLS: ${SMTP_TLS:-false}
    ports:
      - "8000:8000"
    volumes:
      - reports_data:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: .
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
    entrypoint: []
    command: >
      streamlit run nordiq/frontend/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  reports_data:
